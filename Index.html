function country(){return state.countries.find(c=>c.name===selected)}function byIso(iso){return state.countries.find(c=>c.iso===iso)}function addEvent(ico,msg){state.events.unshift({ico,time:timeShort(),msg});if(state.events.length>60)state.events.pop()}function timeShort(){return String(simHour).padStart(2,"0")+":"+String(simMinute).padStart(2,"0")}function dayOfYear(d){const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}function fmtDate(d){return d.toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"})}function tick(){if(paused)return;for(let i=0;i<speed;i++)advanceDay();render()}function advanceDay(){simDate.setDate(simDate.getDate()+1);const c=country();c.treasury+=dailyBalance(c);c.pop+=Math.round((c.happiness-60)*32+c.stability*11);c.gdp+=Math.round(c.gdp*.00004+rnd(-4e6,8e6));c.co2+=Math.max(0,Math.round(c.installed*8+c.gdp/7e6-c.energy*1.6));c.energy+=Math.round((c.installed-c.energy)*.002);c.happiness=clamp(c.happiness+rnd(-.05,.08)-c.co2/1e12,20,95);c.stability=clamp(c.stability+(c.happiness-70)*.002+rnd(-.03,.03),20,96);processQueue(c);updateAI();updateMarket();if(Math.random()<.035)addEvent("📰",`La bolsa global se mueve un ${rnd(-1.4,1.8).toFixed(2)}%.`)}function dailyBalance(c){return Math.round(c.gdp/365*.010-c.military*55-c.energy*180+c.exports/365*.03-c.imports/365*.025)}function updateAI(){state.countries.filter(c=>c.name!==selected).forEach(c=>{c.gdp+=Math.round(c.gdp*rnd(-.00002,.00008));c.co2+=Math.max(0,Math.round(c.installed*rnd(3,9)));c.happiness=clamp(c.happiness+rnd(-.04,.04),20,95);c.stability=clamp(c.stability+rnd(-.05,.05),15,95);c.relation=clamp(c.relation+rnd(-.08,.08),0,100);c.energy=Math.round(c.energy+rnd(-120,170))})}function updateMarket(){state.market.forEach(m=>{m.delta=rnd(-1.5,1.8);m.price=Math.max(2,m.price*(1+m.delta/100))})}function processQueue(c){c.queue.forEach(q=>q.remaining--);const done=c.queue.filter(q=>q.remaining<=0);c.queue=c.queue.filter(q=>q.remaining>0);done.forEach(q=>applyBuild(c,q))}function applyBuild(c,q){const b=findBuild(q.bid);c.gdp+=b.gdp||0;c.pop+=b.pop||0;c.labor+=b.jobs||0;c.unemployment=Math.max(0,c.unemployment-(b.jobs||0));c.energy+=b.energy||0;c.installed+=Math.max(0,b.energy||0);c.co2+=b.co2||0;c.happiness=clamp(c.happiness+(b.happiness||0),0,100);c.research+=b.research||0;c.military+=b.military||0;c.cyber+=b.cyber||0;c.exports+=Math.round((b.gdp||0)*.12);const site=c.sites.find(s=>s.id===q.site);if(site){site.b=q.bid;site.lvl=q.level||1}addEvent("🏗️",`${c.name} completa ${b.name}${q.level?` nivel ${q.level}`:""}.`)}function findBuild(id){for(const arr of Object.values(BUILDINGS)){const b=arr.find(x=>x.id===id);if(b)return b}return null}function buildCost(b,site){return Math.round(b.cost*(site?.b===b.id?1+(site.lvl||1)*.65:1))}function buildDays(b,site){return Math.round(b.days*(site?.b===b.id?.55+(site.lvl||1)*.2:1))}function canPay(c,cost){if(c.treasury>=cost)return true;addEvent("⛔",`Tesorería insuficiente. Faltan ${EURO(cost-c.treasury)}.`);return false}function startBuild(bid,siteId){const c=country(),b=findBuild(bid),site=c.sites.find(s=>s.id===siteId)||c.sites[0],cost=buildCost(b,site);if(!canPay(c,cost))return;c.treasury-=cost;const level=site.b===bid?(site.lvl||1)+1:1;c.queue.push({bid,site:site.id,remaining:buildDays(b,site),total:buildDays(b,site),cost,level});addEvent("🏗️",`Iniciada construcción: ${b.name} en ${site.name}. Coste ${EURO(cost)}.`);render()}function policy(type){const c=country(),map={stimulus:{cost:25e7,fn:()=>{c.gdp+=18e7;c.co2+=12e5;c.labor+=8500;addEvent("📈","Estímulo industrial aprobado.")}},green:{cost:22e7,fn:()=>{c.co2-=32e5;c.relation+=3;c.happiness+=1.2;addEvent("🌱","Transición verde aprobada.")}},military:{cost:20e7,fn:()=>{c.military+=9500;c.stability+=.6;addEvent("🛡️","Programa de rearme ejecutado.")}},research:{cost:18e7,fn:()=>{c.research+=160;c.cyber+=150;c.gdp+=55e6;addEvent("⚗️","Plan nacional de I+D ejecutado.")}},taxup:{cost:0,fn:()=>{c.treasury+=9e7;c.happiness-=.8;addEvent("💶","Subida fiscal aplicada.")}},taxdown:{cost:6e7,fn:()=>{c.happiness+=.9;addEvent("🧾","Rebaja fiscal aplicada.")}}}[type];if(map.cost&&!canPay(c,map.cost))return;c.treasury-=map.cost;map.fn();render()}
function stateWorldCo2(){return 422.1+state.countries.reduce((s,c)=>s+c.co2,0)/1e11}function renderKpis(){const c=country(),data=[["💰 Tesorería",EURO(c.treasury),`${EURO(dailyBalance(c))}/día`],["📊 PIB",EURO(c.gdp),`${EURO(c.gdp*.00004)}/día`],["👥 Población",NUM(c.pop),`+${NUM(Math.max(0,Math.round((c.happiness-60)*32+c.stability*11)))}/día`],["⚡ Energía",`${NUM(c.energy)} MW`,`Inst. ${NUM(c.installed)} MW`],["🏭 Industria",`Nivel ${Math.round(c.gdp/4e11)}`,`Índice ${(c.gdp/c.pop/1000).toFixed(1)}`],["🛡️ Militar",NUM(c.military),`Ranking ${c.powerRank}º`],["🙂 Felicidad",c.happiness.toFixed(1)+"/100",`${(c.happiness-75>=0?"+":"")}${((c.happiness-75)/80).toFixed(2)}/día`],["🛡 Estabilidad",c.stability.toFixed(1)+"/100",`${(c.stability-75>=0?"+":"")}${((c.stability-75)/120).toFixed(2)}/día`],["🌿 CO₂ país",`${NUM(c.co2)} t`,`Atm. ${stateWorldCo2().toFixed(1)} ppm`],["⚗️ Investigación",NUM(c.research),`Cyber ${NUM(c.cyber)}`]];document.getElementById("kpis").innerHTML=data.map(d=>`<div class="kpi"><div class="l">${d[0]}</div><div class="v">${d[1]}</div><div class="d">${d[2]}</div></div>`).join("")}function renderClock(){document.getElementById("dateTxt").textContent=fmtDate(simDate);document.getElementById("timeTxt").textContent=`${String(simHour).padStart(2,"0")}:${String(simMinute).padStart(2,"0")}:${String(simSecond).padStart(2,"0")}`;document.getElementById("dayTxt").textContent=`Día ${dayOfYear(simDate)} · Año ${simDate.getFullYear()} · ${paused?"Pausado":"En curso"}`;document.getElementById("pauseBtn").textContent=paused?"▶":"⏸"}function row(a,b,cls=""){return`<div class="row"><span>${a}</span><span class="val ${cls}">${b}</span></div>`}function renderCountryPanel(){const c=country();document.getElementById("countryPanel").innerHTML=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><div style="font-size:32px">${c.flag}</div><div><h2 style="margin:0">${c.name}</h2><div class="small">${c.capital}</div></div></div><div class="tabs"><button class="active">Resumen</button><button>Economía</button><button>Población</button><button>Militar</button><button>Recursos</button></div>${row("Gobierno",c.government)}${row("Ideología",c.ideology)}${row("Relación internacional",c.relation.toFixed(1)+"/100")}<h3>Información general</h3>${row("Superficie",NUM(c.area)+" km²")}${row("Capital",c.capital)}${row("Población",NUM(c.pop))}${row("PIB nominal",EURO(c.gdp))}${row("PIB per cápita",EURO(c.gdpPc))}${row("Deuda pública",EURO(c.debt))}${row("Reservas",EURO(c.reserves))}${row("Balanza comercial",EURO(c.balance))}<h3>Recursos y energía</h3>${row("Energía producción",NUM(c.energy)+" MW")}${row("Potencia instalada",NUM(c.installed)+" MW")}${row("Agua dulce",NUM(c.water)+" m³/día")}${row("Alimentos",NUM(c.food)+" t/día")}<h3>Decisiones</h3><div class="tabs"><button data-policy="stimulus">📈 Estímulo ${EURO(25e7)}</button><button data-policy="green">🌱 Verde ${EURO(22e7)}</button><button data-policy="military">🛡 Rearme ${EURO(20e7)}</button><button data-policy="research">⚗️ I+D ${EURO(18e7)}</button><button data-policy="taxup">💶 Subir fiscalidad</button><button data-policy="taxdown">🧾 Bajar fiscalidad ${EURO(6e7)}</button></div>`}
function layerValue(c){if(activeLayer==="economy")return c.gdp/3e12*100;if(activeLayer==="population")return c.pop/35e7*100;if(activeLayer==="happiness")return c.happiness;if(activeLayer==="military")return c.military/6e5*100;if(activeLayer==="pollution")return c.co2/9e8*100;if(activeLayer==="climate")return c.climateRisk;if(activeLayer==="resources")return c.energy/1e6*100;return c.relation}function layerColor(c){if(activeLayer==="political"){if(c.government==="Democracia")return"#4f8fc9";if(c.government==="Autoritario")return"#cc7436";if(c.government==="Monarquía")return"#b4863d";return"#9e5dc7"}const v=clamp(layerValue(c),0,100),inverse=["military","pollution","climate"].includes(activeLayer);return !inverse?v<35?"#b44949":v<65?"#d89036":"#55a96a":v<35?"#55a96a":v<65?"#d89036":"#d64545"}function layerText(c){if(activeLayer==="economy")return EURO(c.gdp);if(activeLayer==="population")return NUM(c.pop);if(activeLayer==="happiness")return c.happiness.toFixed(1);if(activeLayer==="military")return NUM(c.military);if(activeLayer==="pollution")return NUM(c.co2)+" t";if(activeLayer==="resources")return NUM(c.energy)+" MW";if(activeLayer==="climate")return c.climateRisk+"/100";return c.government}function legend(){return`<span><span class="sw" style="background:#55a96a"></span>Aliado/favorable</span><br><span><span class="sw" style="background:#d89036"></span>Tenso/medio</span><br><span><span class="sw" style="background:#d64545"></span>Hostil/crítico</span>`}function featureStyle(feature){const c=byIso(feature.id);return{color:c?.name===selected?"#ffe65c":"#d6f4ff",weight:c?.name===selected?2.8:.7,fillColor:c?layerColor(c):"#2b5b68",fillOpacity:c?.name===selected?.72:.55}}function onEachFeature(feature,layer){const c=byIso(feature.id);if(!c)return;layer.on({click:()=>{selected=c.name;focusCountry();render()},mouseover:e=>{e.target.setStyle({weight:2,color:"#fff"})},mouseout:e=>{geoLayer.resetStyle(e.target)}});layer.bindTooltip(`<b>${c.flag} ${c.name}</b><br>${layerText(c)}<br>PIB: ${EURO(c.gdp)}<br>Población: ${NUM(c.pop)}`,{sticky:true})}function renderWorldMap(){document.getElementById("layerBox").innerHTML=`<b>Capas del mapa</b>${Object.entries(LAYERS).map(([k,v])=>`<button class="${activeLayer===k?"active":""}" data-layer="${k}">${v}</button>`).join("")}`;document.getElementById("legend").innerHTML=legend();document.getElementById("countrySelect").innerHTML=state.countries.map(c=>`<option value="${c.name}" ${c.name===selected?"selected":""}>${c.flag} ${c.name}</option>`).join("");if(geoLayer)geoLayer.setStyle(featureStyle);renderWorldMarkers()}function renderWorldMarkers(){worldMarkers.forEach(m=>worldMap.removeLayer(m));worldMarkers=[];state.countries.forEach(c=>{const marker=L.circleMarker([c.lat,c.lon],{radius:c.name===selected?8:5,color:c.name===selected?"#ffe65c":"#e6f7ff",weight:c.name===selected?3:1,fillColor:layerColor(c),fillOpacity:.9}).addTo(worldMap).bindTooltip(`${c.flag} ${c.name}`,{permanent:c.name===selected,direction:"top"});marker.on("click",()=>{selected=c.name;focusCountry();render()});worldMarkers.push(marker)})}function renderLocalMap(){const c=country();localMarkers.forEach(m=>localMap.removeLayer(m));localMarkers=[];localMap.setView([c.lat,c.lon],c.zoom||5);c.sites.forEach(s=>{const b=findBuild(s.b),cls=s.type,html=`<div class="markerIcon ${cls}">${b?b.icon:siteIcon(s.type)}</div>`,icon=L.divIcon({html,className:"",iconSize:[28,28],iconAnchor:[14,14]});const mk=L.marker([s.lat,s.lon],{icon}).addTo(localMap).bindTooltip(`${s.name}<br>Nivel ${s.lvl||1}`,{permanent:true,direction:"top",offset:[0,-12]});mk.on("click",()=>L.popup().setLatLng([s.lat,s.lon]).setContent(`<b>${s.name}</b><br>Tipo: ${s.type}<br>Nivel: ${s.lvl||1}<br>Construcción actual: ${findBuild(s.b)?.name||"Sin edificio"}`).openOn(localMap));localMarkers.push(mk)})}function siteIcon(t){return{capital:"⭐",industry:"🏭",port:"⚓",energy:"⚡",farm:"🌾",military:"🎖️"}[t]||"📍"}function buildTabName(k){return{residential:"Residencial",industries:"Industrias",infrastructure:"Infraestructura",energy:"Energía",parks:"Parques",military:"Militar"}[k]}function renderBuildPanel(){const c=country(),buttons=Object.keys(BUILDINGS).map(k=>`<button class="${activeBuildTab===k?"active":""}" data-buildtab="${k}">${buildTabName(k)}</button>`).join(""),rows=BUILDINGS[activeBuildTab].map(b=>{const site=c.sites[0],cost=buildCost(b,site),days=buildDays(b,site);return`<tr><td>${b.icon} ${b.name}<br><span class="small">${b.effect}</span></td><td>${EURO(cost)}</td><td>${days} días</td><td><select data-site-for="${b.id}">${c.sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join("")}</select></td><td><button class="good" data-build="${b.id}">Construir</button></td></tr>`}).join(""),q=c.queue.map(q=>`<div style="margin:8px 0"><div class="row"><span>${findBuild(q.bid).icon} ${findBuild(q.bid).name}</span><span>${q.remaining}/${q.total} días</span></div><div class="progress"><span style="width:${100*(1-q.remaining/q.total)}%"></span></div></div>`).join("")||"<div class='small'>Sin construcciones activas.</div>";document.getElementById("buildPanel").innerHTML=`<div class="tabs">${buttons}</div><div class="scrollx"><table><tr><th>Edificio</th><th>Coste</th><th>Tiempo</th><th>Región</th><th></th></tr>${rows}</table></div><h3>Cola de construcción</h3>${q}<div class="notice">Mapas reales con Leaflet + OpenStreetMap. Selecciona un país para centrar la vista local.</div>`}function renderEvents(){document.getElementById("eventsPanel").innerHTML=state.events.map(e=>`<div class="event"><div class="ico">${e.ico}</div><div class="tm">${e.time}</div><div>${e.msg}</div></div>`).join("")||"<div class='small'>Sin eventos recientes.</div>"}function renderMatrix(){const c=country();document.getElementById("matrixPanel").innerHTML=`<h3>Eventos activos</h3>${c.queue.map(q=>row(findBuild(q.bid).name,q.remaining+" días")).join("")||row("Sin eventos activos","—")}<h3>Mejoras nacionales</h3>${row("Nivel infraestructura",Math.round(c.gdp/22e10))}${row("Nivel industrial",Math.round(c.gdp/18e10))}${row("Nivel tecnológico",Math.round(c.research/300))}${row("Nivel seguridad",Math.round(c.military/30000))}${row("Medio ambiente",Math.round(100-c.climateRisk))}<h3>Bolsa</h3>${state.market.map(m=>row(m.name,`${m.price.toFixed(2)} € <span class="${m.delta>=0?"green":"red"}">${m.delta.toFixed(2)}%</span>`)).join("")}`}function render(){renderKpis();renderClock();renderCountryPanel();renderWorldMap();renderLocalMap();renderBuildPanel();renderEvents();renderMatrix()}function focusCountry(){const c=country();worldMap.setView([c.lat,c.lon],c.name==="España"?5:3);localMap.setView([c.lat,c.lon],c.zoom||5)}function save(){localStorage.setItem(SAVE_KEY,JSON.stringify({state,selected,activeLayer,activeBuildTab,paused,speed,date:simDate.toISOString()}));addEvent("💾","Partida guardada.");render()}function load(){const raw=localStorage.getItem(SAVE_KEY);if(!raw)return alert("No hay partida guardada.");const o=JSON.parse(raw);state=o.state;selected=o.selected;activeLayer=o.activeLayer;activeBuildTab=o.activeBuildTab;paused=o.paused;speed=o.speed;simDate=new Date(o.date);addEvent("📂","Partida cargada.");render();focusCountry()}function reset(){if(confirm("¿Reiniciar simulación?")){localStorage.removeItem(SAVE_KEY);init()}}function makeDraggable(){document.querySelectorAll(".window").forEach(win=>{const bar=win.querySelector(".titlebar");let sx,sy,sl,st,drag=false;bar.addEventListener("pointerdown",e=>{drag=true;sx=e.clientX;sy=e.clientY;sl=win.offsetLeft;st=win.offsetTop;bar.setPointerCapture(e.pointerId)});bar.addEventListener("pointermove",e=>{if(!drag)return;win.style.left=sl+e.clientX-sx+"px";win.style.top=st+e.clientY-sy+"px"});bar.addEventListener("pointerup",()=>drag=false)})}document.body.addEventListener("click",e=>{const t=e.target.closest("button");if(!t)return;if(t.dataset.action==="pause"){paused=!paused;render()}if(t.dataset.action==="save")save();if(t.dataset.action==="load")load();if(t.dataset.action==="reset")reset();if(t.dataset.speed){speed=Number(t.dataset.speed);paused=false;render()}if(t.dataset.focus){document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.focus===t.dataset.focus));const target={world:"panel-world",local:"panel-local",economy:"panel-country",cities:"panel-local",military:"panel-matrix",diplomacy:"panel-country",climate:"panel-world",market:"panel-matrix"}[t.dataset.focus];document.getElementById(target)?.scrollIntoView({behavior:"smooth",block:"center"})}if(t.dataset.layer){activeLayer=t.dataset.layer;render()}if(t.dataset.buildtab){activeBuildTab=t.dataset.buildtab;render()}if(t.dataset.build){const sel=document.querySelector(`[data-site-for="${t.dataset.build}"]`);startBuild(t.dataset.build,sel?sel.value:null)}if(t.dataset.policy)policy(t.dataset.policy)});document.body.addEventListener("change",e=>{if(e.target.id==="countrySelect"){selected=e.target.value;focusCountry();render()}});function initMaps(){worldMap=L.map("worldMap",{zoomControl:true,worldCopyJump:true}).setView([25,8],2);localMap=L.map("localMap",{zoomControl:true}).setView([40.4168,-3.7038],6);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(worldMap);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(localMap);fetch(GEOJSON_URL).then(r=>r.json()).then(data=>{geoLayer=L.geoJSON(data,{style:featureStyle,onEachFeature}).addTo(worldMap);render()}).catch(()=>{addEvent("⚠️","No se pudo cargar GeoJSON mundial. Se mantienen marcadores reales sobre OpenStreetMap.");render()})}function init(){state=newState();selected="España";activeLayer="political";activeBuildTab="industries";paused=false;speed=7;simDate=new Date(2026,6,3);state.events=[];addEvent("🌍","Simulación iniciada con España como país seleccionado.");addEvent("🗺️","Sistema cartográfico cambiado a OpenStreetMap + Leaflet.");if(!worldMap)initMaps();else{render();focusCountry()}makeDraggable()}init();setInterval(tick,900);
</script></body></html>
