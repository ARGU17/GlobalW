<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NEXUS RTS — Simulación Geopolítica Moderna</title>

  <!-- Leaflet: mapas reales OpenStreetMap -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQkiuI8R6Bf3q5g6xVZtNFu4DlXhQ="
    crossorigin=""
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <!-- Barra superior fija -->
  <header id="topbar">
    <section class="brand">
      <div class="brand-icon">🌐</div>
      <div>
        <h1>NEXUS RTS</h1>
        <p>Simulación Geopolítica Moderna</p>
      </div>
    </section>

    <section id="global-kpis" class="global-kpis">
      <!-- Renderizado desde ui.js -->
    </section>

    <section class="time-panel">
      <div>
        <div id="sim-date" class="sim-date">3 julio 2026</div>
        <div id="sim-time" class="sim-time">14:35:22</div>
        <div id="sim-status" class="sim-status">En curso</div>
      </div>

      <div class="speed-controls">
        <button data-action="toggle-pause" id="pause-button">⏸</button>
        <button data-speed="1">x1</button>
        <button data-speed="3">x3</button>
        <button data-speed="7" class="active">x7</button>
        <button data-speed="30">x30</button>
      </div>
    </section>
  </header>

  <!-- Navegación principal -->
  <nav id="main-nav">
    <button data-focus-panel="world-map-panel" class="active">🌍 Mapa Mundial</button>
    <button data-focus-panel="local-map-panel">🗺 Vista Local</button>
    <button data-focus-panel="country-panel">🏛 País</button>
    <button data-focus-panel="build-panel">🏗 Construcción</button>
    <button data-focus-panel="economy-panel">📊 Economía</button>
    <button data-focus-panel="events-panel">📰 Eventos</button>
    <button data-action="save-game">💾 Guardar</button>
    <button data-action="load-game">📂 Cargar</button>
    <button data-action="reset-game" class="danger">♻ Reiniciar</button>
  </nav>

  <!-- Escritorio principal -->
  <main id="desktop">
    <!-- País seleccionado -->
    <section id="country-panel" class="window" style="left: 8px; top: 8px; width: 300px; height: 560px;">
      <div class="window-title">
        <span>País seleccionado</span>
        <span class="drag-hint">↕</span>
      </div>
      <div id="country-content" class="window-content"></div>
    </section>

    <!-- Mapa mundial real -->
    <section id="world-map-panel" class="window" style="left: 318px; top: 8px; width: 850px; height: 560px;">
      <div class="window-title">
        <span>Mapa geopolítico mundial</span>
        <span class="drag-hint">↕</span>
      </div>

      <div class="map-window-content">
        <div id="world-map"></div>

        <div id="world-map-legend" class="map-overlay map-legend">
          <!-- Renderizado desde maps.js -->
        </div>

        <div id="world-map-layers" class="map-overlay map-layers">
          <!-- Renderizado desde maps.js -->
        </div>

        <div class="map-overlay country-search">
          <select id="country-selector"></select>
        </div>
      </div>
    </section>

    <!-- Construcción -->
    <section id="build-panel" class="window" style="left: 1178px; top: 8px; width: 380px; height: 560px;">
      <div class="window-title">
        <span>Construir / mejorar</span>
        <span class="drag-hint">↕</span>
      </div>
      <div id="build-content" class="window-content"></div>
    </section>

    <!-- Vista local real del país seleccionado -->
    <section id="local-map-panel" class="window" style="left: 318px; top: 578px; width: 850px; height: 385px;">
      <div class="window-title">
        <span>Vista local del país seleccionado</span>
        <span class="drag-hint">↕</span>
      </div>
      <div class="map-window-content">
        <div id="local-map"></div>
      </div>
    </section>

    <!-- Economía / datos globales -->
    <section id="economy-panel" class="window" style="left: 1178px; top: 578px; width: 380px; height: 385px;">
      <div class="window-title">
        <span>Economía y datos globales</span>
        <span class="drag-hint">↕</span>
      </div>
      <div id="economy-content" class="window-content"></div>
    </section>

    <!-- Eventos -->
    <section id="events-panel" class="window" style="left: 8px; top: 578px; width: 300px; height: 385px;">
      <div class="window-title">
        <span>Eventos recientes</span>
        <span class="drag-hint">↕</span>
      </div>
      <div id="events-content" class="window-content"></div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="">
  </script>

  <!-- Módulos del juego -->
  <script src="./js/data.js"></script>
  <script src="./js/simulation.js"></script>
  <script src="./js/maps.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
