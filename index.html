function initSites(c){if(c.name==="España")c.sites=[{id:"madrid",x:52,y:50,name:"Madrid",type:"capital",b:null,lvl:1},{id:"barcelona",x:82,y:36,name:"Barcelona",type:"port",b:null,lvl:1},{id:"valencia",x:75,y:59,name:"Valencia",type:"energy",b:null,lvl:1},{id:"sevilla",x:38,y:76,name:"Sevilla",type:"industry",b:null,lvl:1},{id:"bilbao",x:58,y:21,name:"Bilbao",type:"industry",b:null,lvl:1},{id:"acoruna",x:20,y:26,name:"A Coruña",type:"port",b:null,lvl:1},{id:"zaragoza",x:67,y:42,name:"Zaragoza",type:"energy",b:null,lvl:1},{id:"malaga",x:49,y:84,name:"Málaga",type:"port",b:null,lvl:1},{id:"valladolid",x:43,y:36,name:"Valladolid",type:"farm",b:null,lvl:1},{id:"murcia",x:70,y:72,name:"Murcia",type:"farm",b:null,lvl:1}];else c.sites=[{id:"capital",x:50,y:48,name:c.capital,type:"capital",b:null,lvl:1},{id:"north",x:42,y:25,name:"Región norte",type:"industry",b:null,lvl:1},{id:"coast",x:70,y:63,name:"Puerto principal",type:"port",b:null,lvl:1},{id:"energy",x:35,y:66,name:"Nodo energético",type:"energy",b:null,lvl:1},{id:"farm",x:62,y:39,name:"Región agraria",type:"farm",b:null,lvl:1}]}
function seedBuildings(c){c.sites.forEach(s=>{if(s.type==="industry")s.b="textile";if(s.type==="energy")s.b="solar";if(s.type==="farm")s.b="park";if(s.type==="port")s.b="ports"})}function country(){return state.countries.find(c=>c.name===selected)}function addEvent(ico,msg){state.events.unshift({ico,time:timeShort(),msg});if(state.events.length>60)state.events.pop()}function timeShort(){return String(simHour).padStart(2,"0")+":"+String(simMinute).padStart(2,"0")}function dayOfYear(d){const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}function fmtDate(d){return d.toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"})}
function tick(){if(paused)return;for(let i=0;i<speed;i++)advanceDay();render()}function advanceDay(){simDate.setDate(simDate.getDate()+1);const c=country();c.treasury+=dailyBalance(c);c.pop+=Math.round((c.happiness-60)*32+c.stability*11);c.gdp+=Math.round(c.gdp*0.00004+rnd(-4000000,8000000));c.co2+=Math.max(0,Math.round(c.installed*8+c.gdp/7000000-c.energy*1.6));c.energy+=Math.round((c.installed-c.energy)*0.002);c.happiness=clamp(c.happiness+rnd(-.05,.08)-c.co2/1e12,20,95);c.stability=clamp(c.stability+(c.happiness-70)*0.002+rnd(-.03,.03),20,96);processQueue(c);updateAI();updateMarket();if(Math.random()<.035)addEvent("📰",`La bolsa global se mueve un ${rnd(-1.4,1.8).toFixed(2)}%.`)}function dailyBalance(c){return Math.round(c.gdp/365*0.010-c.military*55-c.energy*180+c.exports/365*0.03-c.imports/365*0.025)}function updateAI(){state.countries.filter(c=>c.name!==selected).forEach(c=>{c.gdp+=Math.round(c.gdp*rnd(-0.00002,0.00008));c.co2+=Math.max(0,Math.round(c.installed*rnd(3,9)));c.happiness=clamp(c.happiness+rnd(-.04,.04),20,95);c.stability=clamp(c.stability+rnd(-.05,.05),15,95);c.relation=clamp(c.relation+rnd(-.08,.08),0,100);c.energy=Math.round(c.energy+rnd(-120,170))})}function updateMarket(){state.market.forEach(m=>{m.delta=rnd(-1.5,1.8);m.price=Math.max(2,m.price*(1+m.delta/100))})}function processQueue(c){c.queue.forEach(q=>q.remaining--);const done=c.queue.filter(q=>q.remaining<=0);c.queue=c.queue.filter(q=>q.remaining>0);done.forEach(q=>applyBuild(c,q))}function applyBuild(c,q){const b=findBuild(q.bid);c.gdp+=b.gdp||0;c.pop+=b.pop||0;c.labor+=b.jobs||0;c.unemployment=Math.max(0,c.unemployment-(b.jobs||0));c.energy+=b.energy||0;c.installed+=Math.max(0,b.energy||0);c.co2+=b.co2||0;c.happiness=clamp(c.happiness+(b.happiness||0),0,100);c.research+=b.research||0;c.military+=b.military||0;c.cyber+=b.cyber||0;c.exports+=Math.round((b.gdp||0)*.12);const site=c.sites.find(s=>s.id===q.site);if(site){site.b=q.bid;site.lvl=q.level||1}addEvent("🏗️",`${c.name} completa ${b.name}${q.level?` nivel ${q.level}`:""}.`)}function findBuild(id){for(const arr of Object.values(BUILDINGS)){const b=arr.find(x=>x.id===id);if(b)return b}return null}function buildCost(b,site){return Math.round(b.cost*(site?.b===b.id?(1+(site.lvl||1)*.65):1))}function buildDays(b,site){return Math.round(b.days*(site?.b===b.id?0.55+(site.lvl||1)*.2:1))}function canPay(c,cost){if(c.treasury>=cost)return true;addEvent("⛔",`Tesorería insuficiente. Faltan ${EURO(cost-c.treasury)}.`);return false}function startBuild(bid,siteId){const c=country(),b=findBuild(bid),site=c.sites.find(s=>s.id===siteId)||c.sites[0],cost=buildCost(b,site);if(!canPay(c,cost))return;c.treasury-=cost;const level=site.b===bid?(site.lvl||1)+1:1;c.queue.push({bid,site:site.id,remaining:buildDays(b,site),total:buildDays(b,site),cost,level});addEvent("🏗️",`Iniciada construcción: ${b.name} en ${site.name}. Coste ${EURO(cost)}.`);render()}function policy(type){const c=country();const map={stimulus:{cost:250000000,fn:()=>{c.gdp+=180000000;c.co2+=1200000;c.labor+=8500;addEvent("📈","Estímulo industrial aprobado.")}},green:{cost:220000000,fn:()=>{c.co2-=3200000;c.relation+=3;c.happiness+=1.2;addEvent("🌱","Transición verde aprobada.")}},military:{cost:200000000,fn:()=>{c.military+=9500;c.stability+=.6;addEvent("🛡️","Programa de rearme ejecutado.")}},research:{cost:180000000,fn:()=>{c.research+=160;c.cyber+=150;c.gdp+=55000000;addEvent("⚗️","Plan nacional de I+D ejecutado.")}},taxup:{cost:0,fn:()=>{c.treasury+=90000000;c.happiness-=.8;addEvent("💶","Subida fiscal aplicada.")}},taxdown:{cost:60000000,fn:()=>{c.happiness+=.9;addEvent("🧾","Rebaja fiscal aplicada.")}}}[type];if(map.cost&&!canPay(c,map.cost))return;c.treasury-=map.cost;map.fn();render()}
function layerColor(c){if(activeLayer==="political"){if(c.government==="Democracia")return"#4f8fc9";if(c.government==="Autoritario")return"#cc7436";if(c.government==="Monarquía")return"#b4863d";return"#9e5dc7"}let v=0,good=true;if(activeLayer==="economy"){v=clamp(c.gdp/3000000000000*100,0,100);good=true}if(activeLayer==="population"){v=clamp(c.pop/350000000*100,0,100);good=true}if(activeLayer==="happiness"){v=c.happiness;good=true}if(activeLayer==="military"){v=clamp(c.military/600000*100,0,100);good=false}if(activeLayer==="pollution"){v=clamp(c.co2/900000000*100,0,100);good=false}if(activeLayer==="climate"){v=c.climateRisk;good=false}if(activeLayer==="resources"){v=clamp(c.energy/1000000*100,0,100);good=true}if(good)return v<35?"#b44949":v<65?"#d89036":"#55a96a";return v<35?"#55a96a":v<65?"#d89036":"#d64545"}function lonX(lon){return(lon+180)/360*1000}function latY(lat){return(90-lat)/180*500+20}function markerPath(c){const x=lonX(c.lon),y=latY(c.lat),s=Math.max(10,Math.min(46,Math.sqrt(c.gdp/1e9)*1.2));return`M${x-s},${y-s*.55} L${x+s*.8},${y-s*.7} L${x+s},${y+s*.35} L${x+s*.1},${y+s} L${x-s*.9},${y+s*.6} L${x-s*1.1},${y} Z`}
function renderKpis(){const c=country(),data=[["💰 Tesorería",EURO(c.treasury),`${EURO(dailyBalance(c))}/día`],["📊 PIB",EURO(c.gdp),`${EURO(c.gdp*0.00004)}/día`],["👥 Población",NUM(c.pop),`+${NUM(Math.max(0,Math.round((c.happiness-60)*32+c.stability*11)))}/día`],["⚡ Energía",`${NUM(c.energy)} MW`,`Inst. ${NUM(c.installed)} MW`],["🏭 Industria",`Nivel ${Math.round(c.gdp/400000000000)}`,`Índice ${(c.gdp/c.pop/1000).toFixed(1)}`],["🛡️ Militar",NUM(c.military),`Ranking ${c.powerRank}º`],["🙂 Felicidad",c.happiness.toFixed(1)+"/100",`${(c.happiness-75>=0?"+":"")}${((c.happiness-75)/80).toFixed(2)}/día`],["🛡 Estabilidad",c.stability.toFixed(1)+"/100",`${(c.stability-75>=0?"+":"")}${((c.stability-75)/120).toFixed(2)}/día`],["🌿 CO₂ país",`${NUM(c.co2)} t`,`Atm. ${stateWorldCo2().toFixed(1)} ppm`],["⚗️ Investigación",NUM(c.research),`Cyber ${NUM(c.cyber)}`]];document.getElementById("kpis").innerHTML=data.map(d=>`<div class="kpi"><div class="l">${d[0]}</div><div class="v">${d[1]}</div><div class="d">${d[2]}</div></div>`).join("")}function stateWorldCo2(){return 422.1+state.countries.reduce((s,c)=>s+c.co2,0)/1e11}function renderClock(){document.getElementById("dateTxt").textContent=simDate.toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"});document.getElementById("timeTxt").textContent=`${String(simHour).padStart(2,"0")}:${String(simMinute).padStart(2,"0")}:${String(simSecond).padStart(2,"0")}`;document.getElementById("dayTxt").textContent=`Día ${dayOfYear(simDate)} · Año ${simDate.getFullYear()} · ${paused?"Pausado":"En curso"}`;document.getElementById("pauseBtn").textContent=paused?"▶":"⏸"}function row(a,b,cls=""){return`<div class="row"><span>${a}</span><span class="val ${cls}">${b}</span></div>`}
function renderCountryPanel(){const c=country();document.getElementById("countryPanel").innerHTML=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><div style="font-size:32px">${c.flag}</div><div><h2 style="margin:0">${c.name}</h2><div class="small">${c.capital}</div></div></div><div class="tabs"><button class="active">Resumen</button><button>Economía</button><button>Población</button><button>Militar</button><button>Recursos</button></div>${row("Gobierno",c.government)}${row("Ideología",c.ideology)}${row("Relación internacional",c.relation.toFixed(1)+"/100")}<h3>Información general</h3>${row("Superficie",NUM(c.area)+" km²")}${row("Capital",c.capital)}${row("Población",NUM(c.pop))}${row("PIB nominal",EURO(c.gdp))}${row("PIB per cápita",EURO(c.gdpPc))}${row("Deuda pública",EURO(c.debt))}${row("Reservas",EURO(c.reserves))}${row("Balanza comercial",EURO(c.balance))}<h3>Recursos y energía</h3>${row("Energía producción",NUM(c.energy)+" MW")}${row("Potencia instalada",NUM(c.installed)+" MW")}${row("Agua dulce",NUM(c.water)+" m³/día")}${row("Alimentos",NUM(c.food)+" t/día")}<h3>Decisiones</h3><div class="tabs"><button data-policy="stimulus">📈 Estímulo ${EURO(250000000)}</button><button data-policy="green">🌱 Verde ${EURO(220000000)}</button><button data-policy="military">🛡 Rearme ${EURO(200000000)}</button><button data-policy="research">⚗️ I+D ${EURO(180000000)}</button><button data-policy="taxup">💶 Subir fiscalidad</button><button data-policy="taxdown">🧾 Bajar fiscalidad ${EURO(60000000)}</button></div>`}
function layerText(c){if(activeLayer==="economy")return EURO(c.gdp);if(activeLayer==="population")return NUM(c.pop);if(activeLayer==="happiness")return c.happiness.toFixed(1);if(activeLayer==="military")return NUM(c.military);if(activeLayer==="pollution")return NUM(c.co2)+" t";if(activeLayer==="resources")return NUM(c.energy)+" MW";if(activeLayer==="climate")return c.climateRisk+"/100";return c.government}function legend(){return`<span><span class="sw" style="background:#55a96a"></span>Aliado/favorable</span> <span><span class="sw" style="background:#d89036"></span>Tenso/medio</span> <span><span class="sw" style="background:#d64545"></span>Hostil/crítico</span>`}
function renderWorldMap(){const countries=state.countries,paths=countries.map(c=>{const x=lonX(c.lon),y=latY(c.lat);return`<path class="country ${c.name===selected?"selected":""}" data-country="${c.name}" d="${markerPath(c)}" fill="${layerColor(c)}" opacity=".86"></path><text class="mapLabel" x="${x}" y="${y+2}">${c.name}</text><text class="mapSmall" x="${x}" y="${y+15}">${layerText(c)}</text>`}).join("");document.getElementById("worldMap").innerHTML=`<svg viewBox="0 0 1000 560"><rect class="ocean" width="1000" height="560"/><path class="land" d="M55,120 C130,65 270,78 335,155 C405,238 335,320 215,310 C105,300 65,225 55,120Z"/><path class="land" d="M360,82 C520,35 672,100 705,225 C735,340 630,420 485,386 C360,356 315,185 360,82Z"/><path class="land" d="M645,140 C785,75 950,130 970,270 C990,395 805,455 690,370 C600,305 585,190 645,140Z"/><path class="land" d="M245,348 C330,325 420,395 392,505 C355,555 260,530 225,435Z"/><path class="land" d="M725,390 C840,360 935,440 890,525 C790,550 700,500 725,390Z"/>${paths}</svg><div class="legend">${legend()}</div><div class="layerBox"><b>Capas del mapa</b>${Object.entries(LAYERS).map(([k,v])=>`<button class="${activeLayer===k?"active":""}" data-layer="${k}">${v}</button>`).join("")}</div><div class="searchBox"><select data-select-country style="width:100%">${countries.map(c=>`<option ${c.name===selected?"selected":""}>${c.name}</option>`).join("")}</select></div><div class="tip" id="tip"></div>`}
function siteIcon(t){return{capital:"⭐",industry:"🏭",port:"⚓",energy:"⚡",farm:"🌾"}[t]||"📍"}function siteColor(t){return{capital:"#d7b74e",industry:"#4b83b6",port:"#3571b8",energy:"#b9992b",farm:"#54a85d"}[t]||"#498"}function renderLocalMap(){const c=country(),sites=c.sites.map(s=>{const b=findBuild(s.b)||{icon:siteIcon(s.type),name:s.name};return`<g class="site" data-site="${s.id}" transform="translate(${s.x*8.3},${s.y*3.6})"><circle r="13" fill="${siteColor(s.type)}"></circle><text y="1">${b.icon}</text><text class="siteLabel" y="-20">${s.name}</text><text class="mapSmall" y="28">L${s.lvl||1}</text></g>`}).join(""),shape=c.name==="España"?"M115,130 L235,95 L360,110 L500,85 L635,120 L755,170 L765,260 L690,315 L560,330 L485,300 L405,350 L275,335 L185,300 L120,235 Z":"M155,95 L665,100 L740,215 L690,325 L505,350 L330,315 L165,260 Z";document.getElementById("localMap").innerHTML=`<svg viewBox="0 0 830 360"><rect class="ocean" width="830" height="360"/><path class="localBg" d="${shape}"/>${sites}<text x="415" y="190" class="mapLabel" style="font-size:24px">${c.name}</text><g transform="translate(220,328)"><text class="mapSmall" x="0">🏠 Residencial</text><text class="mapSmall" x="110">🏭 Industrial</text><text class="mapSmall" x="220">⚡ Energía</text><text class="mapSmall" x="330">🎖 Militar</text><text class="mapSmall" x="440">🌳 Parques</text></g></svg>`}
function buildTabName(k){return{residential:"Residencial",industries:"Industrias",infrastructure:"Infraestructura",energy:"Energía",parks:"Parques",military:"Militar"}[k]}function renderBuildPanel(){const c=country(),buttons=Object.keys(BUILDINGS).map(k=>`<button class="${activeBuildTab===k?"active":""}" data-buildtab="${k}">${buildTabName(k)}</button>`).join(""),rows=BUILDINGS[activeBuildTab].map(b=>{const site=c.sites[0],cost=buildCost(b,site),days=buildDays(b,site);return`<tr><td>${b.icon} ${b.name}<br><span class="small">${b.effect}</span></td><td>${EURO(cost)}</td><td>${days} días</td><td><select data-site-for="${b.id}">${c.sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join("")}</select></td><td><button class="good" data-build="${b.id}">Construir</button></td></tr>`}).join(""),q=c.queue.map(q=>`<div style="margin:8px 0"><div class="row"><span>${findBuild(q.bid).icon} ${findBuild(q.bid).name}</span><span>${q.remaining}/${q.total} días</span></div><div class="progress"><span style="width:${100*(1-q.remaining/q.total)}%"></span></div></div>`).join("")||"<div class='small'>Sin construcciones activas.</div>";document.getElementById("buildPanel").innerHTML=`<div class="tabs">${buttons}</div><div class="scrollx"><table><tr><th>Edificio</th><th>Coste</th><th>Tiempo</th><th>Región</th><th></th></tr>${rows}</table></div><h3>Cola de construcción</h3>${q}`}
function renderEvents(){document.getElementById("eventsPanel").innerHTML=state.events.map(e=>`<div class="event"><div class="ico">${e.ico}</div><div class="tm">${e.time}</div><div>${e.msg}</div></div>`).join("")||"<div class='small'>Sin eventos recientes.</div>"}function renderMatrix(){const c=country();document.getElementById("matrixPanel").innerHTML=`<h3>Eventos activos</h3>${c.queue.map(q=>row(findBuild(q.bid).name,q.remaining+" días")).join("")||row("Sin eventos activos","—")}<h3>Mejoras nacionales</h3>${row("Nivel infraestructura",Math.round(c.gdp/220000000000))}${row("Nivel industrial",Math.round(c.gdp/180000000000))}${row("Nivel tecnológico",Math.round(c.research/300))}${row("Nivel seguridad",Math.round(c.military/30000))}${row("Medio ambiente",Math.round(100-c.climateRisk))}<h3>Bolsa</h3>${state.market.map(m=>row(m.name,`${m.price.toFixed(2)} € <span class="${m.delta>=0?"green":"red"}">${m.delta.toFixed(2)}%</span>`)).join("")}`}
function render(){renderKpis();renderClock();renderCountryPanel();renderWorldMap();renderLocalMap();renderBuildPanel();renderEvents();renderMatrix()}function save(){localStorage.setItem(SAVE_KEY,JSON.stringify({state,selected,activeLayer,activeBuildTab,paused,speed,date:simDate.toISOString()}));addEvent("💾","Partida guardada.");render()}function load(){const raw=localStorage.getItem(SAVE_KEY);if(!raw)return alert("No hay partida guardada.");const o=JSON.parse(raw);state=o.state;selected=o.selected;activeLayer=o.activeLayer;activeBuildTab=o.activeBuildTab;paused=o.paused;speed=o.speed;simDate=new Date(o.date);addEvent("📂","Partida cargada.");render()}function reset(){if(confirm("¿Reiniciar simulación?")){localStorage.removeItem(SAVE_KEY);init()}}
function makeDraggable(){document.querySelectorAll(".window").forEach(win=>{const bar=win.querySelector(".titlebar");let sx,sy,sl,st,drag=false;bar.addEventListener("pointerdown",e=>{drag=true;sx=e.clientX;sy=e.clientY;sl=win.offsetLeft;st=win.offsetTop;bar.setPointerCapture(e.pointerId)});bar.addEventListener("pointermove",e=>{if(!drag)return;win.style.left=sl+e.clientX-sx+"px";win.style.top=st+e.clientY-sy+"px"});bar.addEventListener("pointerup",()=>drag=false)})}
document.body.addEventListener("click",e=>{const t=e.target.closest("button,.country,.site");if(!t)return;if(t.dataset.action==="pause"){paused=!paused;render()}if(t.dataset.action==="save")save();if(t.dataset.action==="load")load();if(t.dataset.action==="reset")reset();if(t.dataset.speed){speed=Number(t.dataset.speed);paused=false;render()}if(t.dataset.show){document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.show===t.dataset.show))}if(t.dataset.layer){activeLayer=t.dataset.layer;render()}if(t.dataset.country){selected=t.dataset.country;render()}if(t.dataset.buildtab){activeBuildTab=t.dataset.buildtab;render()}if(t.dataset.build){const sel=document.querySelector(`[data-site-for="${t.dataset.build}"]`);startBuild(t.dataset.build,sel?sel.value:null)}if(t.dataset.policy)policy(t.dataset.policy)});document.body.addEventListener("change",e=>{if(e.target.dataset.selectCountry){selected=e.target.value;render()}});document.body.addEventListener("mousemove",e=>{const p=e.target.closest(".country"),tip=document.getElementById("tip");if(!tip)return;if(!p){tip.style.display="none";return}const c=state.countries.find(x=>x.name===p.dataset.country);tip.innerHTML=`<b>${c.flag} ${c.name}</b><br>Capital: ${c.capital}<br>PIB: ${EURO(c.gdp)}<br>Población: ${NUM(c.pop)}<br>Energía: ${NUM(c.energy)} MW<br>Militar: ${NUM(c.military)}<br>CO₂: ${NUM(c.co2)} t`;const r=document.getElementById("worldMap").getBoundingClientRect();tip.style.left=Math.min(e.clientX-r.left+14,r.width-240)+"px";tip.style.top=Math.max(14,e.clientY-r.top+14)+"px";tip.style.display="block"});
function init(){state=newState();selected="España";activeLayer="political";activeBuildTab="industries";paused=false;speed=7;simDate=new Date(2026,6,3);state.events=[];addEvent("🌍","Simulación iniciada con España como país seleccionado.");addEvent("🏭","España dispone de industria, energía, puertos y nodos regionales iniciales.");render();makeDraggable()}init();setInterval(tick,900);
</script></body></html>
