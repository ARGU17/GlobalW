<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NEXUS RTS — Simulación Geopolítica Moderna</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/windows.css" />
  <link rel="stylesheet" href="./css/map.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>

<body>
  <header id="topbar">
    <section class="brand">
      <div class="brand-icon">🌐</div>
      <div>
        <h1>NEXUS RTS</h1>
        <p>Simulación Geopolítica Moderna</p>
      </div>
    </section>

    <section id="global-kpis" class="global-kpis"></section>

    <section class="time-panel">
      <div>
        <div id="sim-date" class="sim-date"></div>
        <div id="sim-time" class="sim-time"></div>
        <div id="sim-status" class="sim-status"></div>
      </div>

      <div class="speed-controls">
        <button data-action="toggle-pause" id="pause-button">⏸</button>
        <button data-speed="0.5">x0.5</button>
        <button data-speed="1" class="active">x1</button>
        <button data-speed="3">x3</button>
        <button data-speed="7">x7</button>
        <button data-speed="30">x30</button>
      </div>
    </section>
  </header>

  <main id="desktop">
    <section id="country-panel" class="window">
      <div class="window-title">
        <span>País seleccionado</span>
      </div>
      <div id="country-content" class="window-content"></div>
    </section>

    <section id="world-map-panel" class="window">
      <div class="window-title">
        <span>Mapa geopolítico mundial</span>
      </div>

      <div class="map-window-content">
        <div id="world-map"></div>
        <div id="world-map-legend" class="map-overlay map-legend"></div>
        <div id="world-map-layers" class="map-overlay map-layers"></div>

        <div class="map-overlay country-search">
          <select id="country-selector"></select>
        </div>
      </div>
    </section>

    <section id="build-panel" class="window">
      <div class="window-title">
        <span>Construir / mejorar / producir</span>
      </div>
      <div id="build-content" class="window-content"></div>
    </section>

    <section id="local-map-panel" class="window">
      <div class="window-title">
        <span>Vista local del país seleccionado</span>
      </div>
      <div class="map-window-content">
        <div id="local-map"></div>
      </div>
    </section>

    <section id="economy-panel" class="window">
      <div class="window-title">
        <span>Economía · bolsa · política · operaciones</span>
      </div>
      <div id="economy-content" class="window-content"></div>
    </section>

    <section id="events-panel" class="window">
      <div class="window-title">
        <span>Eventos recientes</span>
      </div>
      <div id="events-content" class="window-content"></div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin="">
  </script>

  <script src="./js/data.js"></script>
  <script src="./js/simulation.js"></script>
  <script src="./js/economy.js"></script>
  <script src="./js/ai.js"></script>
  <script src="./js/diplomacy.js"></script>
  <script src="./js/maps.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
